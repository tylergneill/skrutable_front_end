name: Check OCR Prices

on:
  schedule:
    - cron: '0 12 * * *'  # daily at noon UTC
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check GCV and Sarvam per-page prices
        run: python3 .github/scripts/check_ocr_prices.py
