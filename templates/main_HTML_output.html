{% extends 'base.html' %}
{% set active_page = 'workbench' %}

{% block head_extra %}
	<meta property='og:title' content='skrutable'/>
	<meta property='og:image' content='/assets/ui_screenshot.png'/>
	<meta property='og:description' content='toolkit and online workbench providing useful functions for working with Sanskrit text'/>
	<meta property='og:url' content='https://www.skrutable.info'/>
{% endblock %}

{% block sidebar_controls %}
	<div class="sidebar-controls">

		<div class="control-group">
			<label for="from_scheme">Input Scheme</label>
			<select name="from_scheme" id="from_scheme">
				<optgroup label="Romanizations">
					<option value="IAST">IAST</option>
					<option value="HK">HK</option>
					<option value="SLP">SLP</option>
					<option value="ITRANS">ITRANS</option>
					<option value="VH">VH</option>
					<option value="WX">WX</option>
					<option value="IASTREDUCED" disabled>IAST reduced</option>
				</optgroup>
				<optgroup label="Indic Scripts">
					<option value="DEV">DEV</option>
					<option value="BENGALI">BENGALI</option>
					<option value="GUJARATI">GUJARATI</option>
				</optgroup>
			</select>
		</div>

		<div class="control-group">
			<label for="to_scheme">Output Scheme</label>
			<select name="to_scheme" id="to_scheme">
				<optgroup label="Romanizations">
					<option value="IAST">IAST</option>
					<option value="HK">HK</option>
					<option value="SLP">SLP</option>
					<option value="ITRANS">ITRANS</option>
					<option value="VH">VH</option>
					<option value="WX">WX</option>
					<option value="IASTREDUCED">IAST reduced</option>
				</optgroup>
				<optgroup label="Indic Scripts">
					<option value="DEV">DEV</option>
					<option value="BENGALI">BENGALI</option>
					<option value="GUJARATI">GUJARATI</option>
				</optgroup>
			</select>
		</div>

		<div class="swap-buttons">
			<button type="button" class="btn btn-primary" onclick="swapTexts();">Txt &#8645;</button>
			<button type="button" class="btn btn-primary" onclick="swapSchemes();">Schemes &#8644;</button>
			<button type="button" class="btn btn-primary" onclick="swapBoth();">Both &#8645;&#8644;</button>
		</div>

		<div class="control-group">
			<label>Scansion Detail</label>
			<div class="checkbox-group">
				<label><input type="checkbox" id="weights" name="scan_detail" value="weights" checked/> lglgl</label>
				<label><input type="checkbox" id="morae" name="scan_detail" value="morae" checked/> {mora}</label>
				<label><input type="checkbox" id="gaRas" name="scan_detail" value="gaRas" checked/> [ga&#7751;a]</label>
				<label><input type="checkbox" id="alignment" name="scan_detail" value="alignment" checked/> align</label>
			</div>
		</div>

		<div class="control-group">
			<label for="resplit_option">Re-Split P&#257;das</label>
			<select id="resplit_option" name="resplit_option">
				<option value="none">none</option>
				<option value="resplit_lite">resplit lite</option>
				<option value="resplit_lite_keep_mid">resplit lite keep mid</option>
				<option value="resplit_max">resplit max</option>
				<option value="resplit_max_keep_mid">resplit max keep mid</option>
			</select>
		</div>

	</div>

	<div class="sidebar-actions">
		<button type="submit" class="btn btn-primary btn-block" onclick="set_action('transliterate');" form="overall_form">Transliterate</button>
		<button type="submit" class="btn btn-primary btn-block" onclick="set_action('scan');" form="overall_form">Scan</button>
		<button type="submit" class="btn btn-primary btn-block" onclick="set_action('identify meter');" form="overall_form">Identify Meter</button>
		<button type="submit" class="btn btn-primary btn-block" onclick="set_action('split');" form="overall_form">Split Words</button>

		<div class="action-sub-buttons">
			<button type="submit" class="btn btn-primary" onclick="set_action('transliterate');" form="overall_form" formaction="/whole_file">Translit file &#8679;</button>
			<button type="submit" class="btn btn-primary" onclick="set_action('identify meter');" form="overall_form" formaction="/whole_file">Meter file &#8679;</button>
			<button type="submit" class="btn btn-primary" onclick="set_action('split');" form="overall_form" formaction="/whole_file">Split file &#8679;</button>
		</div>
		<button type="submit" class="btn btn-primary btn-block" onclick="set_action('apte links');" form="overall_form">DSAL-Apte links</button>
	</div>
{% endblock %}

{% block content %}
	<form id="overall_form" action="/" method="POST">
		<textarea id="text_input" name="text_input" class="textarea-input" rows="4" spellcheck="false" placeholder="Enter text here">{{ text_input }}</textarea>

		<div class="html-output">
			{{ output_HTML | safe }}
		</div>
		<input type="hidden" name="text_output" value="" />

		<!-- melody player -->
		<div class="melody-player" id="melodyPlayer">
			<audio id="audio" controls>
				<source type="audio/mp3">
			</audio>
			<div>
				<label for="melody_option">Meter Melody Type Recited by</label>
				<select id="melody_option" name="melody_option">
					{% for melody_option in melody_options %}
					<option value="{{melody_option}}">{{melody_option}}</option>
					{% endfor %}
				</select>
			</div>
		</div>

		<!-- hidden action menu -->
		<select hidden name="skrutable_action" id="skrutable_action">
			<option value="transliterate">transliterate</option>
			<option value="scan">scan</option>
			<option value="identify meter">identify meter</option>
			<option value="split">split</option>
			<option value="apte links">apte links</option>
		</select>
	</form>
{% endblock %}

{% block scripts %}
<script>

	function swapElementValues(e_1, e_2) {
		var tmp = e_1.value;
		e_1.value = e_2.value;
		e_2.value = tmp;
	}
	function swapTexts() {
		swapElementValues( document.getElementById('text_input'), document.getElementById('text_output') );
	}
	function swapSchemes() {
		if ( document.getElementById('to_scheme').value != 'IASTREDUCED') {
			swapElementValues( document.getElementById('from_scheme'), document.getElementById('to_scheme') );
		}
	}
	function swapBoth() {
		if ( document.getElementById('to_scheme').value != 'IASTREDUCED') {
			swapTexts();
			swapSchemes();
		}
	}

	function initialize_choices() {
		document.getElementById("skrutable_action").value = "{{ skrutable_action }}";
		document.getElementById("from_scheme").value = "{{ from_scheme }}";
		document.getElementById("to_scheme").value = "{{ to_scheme }}";
		if ({{ weights }} != 1) { document.getElementById("weights").checked = false; }
		if ({{ morae }} != 1) { document.getElementById("morae").checked = false; }
		if ({{ gaRas }} != 1) { document.getElementById("gaRas").checked = false; }
		if ({{ alignment }} != 1) { document.getElementById("alignment").checked = false; }
		document.getElementById("resplit_option").value = "{{ resplit_option }}";
		{% if melody_options %}
			document.getElementById("melody_option").value = "{{ melody_options[0] }}";
		{% endif %}
	}

	var melodySelectElement = document.getElementById("melody_option");
	const audio_prefix = "/assets/melodies/"
	melodySelectElement.addEventListener("change", update_melody);
	function update_melody() {
		var audioElement = document.getElementById("audio");
		var audio_src_selection = melodySelectElement.value;
		var meter_label = "{{ meter_label }}";

		if (!audio_src_selection || !meter_label) {
			return;
		}

		audio_src_selection = audio_src_selection.replace(/ /g, "-");
		audio_src_selection = audio_src_selection.replace(/\./g, "");
		var audio_src_str = audio_prefix +
							meter_label +
							"-" +
							audio_src_selection +
							".mp3";
		audioElement.src = audio_src_str
	}

	function conditionally_display_melody_player() {
		testArray = "{{ melody_options }}";
		if ( testArray.length > 2 ) {
			document.getElementById("melodyPlayer").classList.add("visible");
		}
	}

	window.onload = function() {
		initialize_choices();
		update_melody();
		conditionally_display_melody_player();
	}

	function set_action(new_skr_act) {
		document.getElementById("skrutable_action").value = new_skr_act;
	}

</script>
{% endblock %}
