{% extends 'base.html' %}
{% set active_page = 'workbench' %}
{% set page_mode = 'workbench' %}

{% block head_extra %}
	<meta property='og:title' content='skrutable'/>
	<meta property='og:image' content='/assets/ui_screenshot.png'/>
	<meta property='og:description' content='toolkit and online workbench providing useful functions for working with Sanskrit text'/>
	<meta property='og:url' content='https://www.skrutable.info'/>
{% endblock %}

{% block sidebar_controls %}
	<div class="sidebar-controls">
		{% include 'sidebar_actions.html' %}
	</div>
{% endblock %}

{% block content %}
	<form id="overall_form" action="/" method="POST">
		<!-- hidden inputs synced by JS for POST submissions -->
		<input type="hidden" name="skrutable_action" id="hidden_action" value="transliterate"/>
		<input type="hidden" name="from_scheme" id="hidden_from_scheme"/>
		<input type="hidden" name="to_scheme" id="hidden_to_scheme"/>
		<input type="hidden" name="resplit_option" id="hidden_resplit_option"/>
		<input type="hidden" name="splitter_model" id="hidden_splitter_model"/>
		<input type="hidden" name="preserve_punctuation" id="hidden_preserve_punctuation"/>
		<input type="hidden" name="preserve_compound_hyphens" id="hidden_preserve_compound_hyphens"/>
		<!-- scan_detail checkboxes added dynamically by syncHiddenInputs -->
		<div id="hidden_scan_detail_container"></div>

		<div class="textarea-swap-group">
			<textarea id="text_input" name="text_input" class="textarea-input" rows="4" spellcheck="false" placeholder="Enter text here">{{ text_input }}</textarea>
			<button type="button" class="btn btn-primary btn-swap-texts" onclick="swapTexts();">&#8645;</button>
			<textarea id="text_output" name="text_output" class="textarea-output" rows="15" spellcheck="false">{{ text_output }}</textarea>
		</div>

		<!-- melody player -->
		<div class="melody-player" id="melodyPlayer">
			<audio id="audio" controls>
				<source type="audio/mp3">
			</audio>
			<div>
				<label for="melody_option">Meter Melody Type Recited by</label>
				<select id="melody_option"></select>
			</div>
		</div>
	</form>
{% endblock %}

{% block scripts %}
<script src="/assets/js/settings.js"></script>
<script>

	// --- Page globals ---
	var currentAction = "{{ skrutable_action }}";
	var currentAvoidVirama = {{ avoid_virama_indic_scripts|default(1)|int }} === 1;
	var currentPreserveCompoundHyphens = {{ preserve_compound_hyphens|default(1)|int }} === 1;
	var currentPreservePunctuation = {{ preserve_punctuation|default(1)|int }} === 1;

	// --- Sidebar callback hooks (called by sidebar_actions.html) ---
	function onActionButton(action) {
		var handlers = {
			'transliterate': doTransliterate,
			'scan': doScan,
			'identify meter': doIdentifyMeter,
			'split': doSplit,
		};
		handlers[action]();
	}

	function onUploadButton(action) {
		currentAction = action;
		syncHiddenInputs();
		saveSettingsToSession();
		var form = document.getElementById("overall_form");
		form.action = "/upload_file";
		form.submit();
	}

	function onSidebarChange() {
		saveSettingsToSession();
	}

	// --- Text persistence ---
	function saveTexts() {
		localStorage.setItem("text_input", document.getElementById("text_input").value);
		localStorage.setItem("text_output", document.getElementById("text_output").value);
	}
	function restoreTexts() {
		var inp = document.getElementById("text_input");
		var out = document.getElementById("text_output");
		if (inp.value || out.value) {
			// Server rendered content (e.g. examples) — save it
			saveTexts();
		} else {
			// Restore from localStorage
			if (localStorage.getItem("text_input")) inp.value = localStorage.getItem("text_input");
			if (localStorage.getItem("text_output")) out.value = localStorage.getItem("text_output");
		}
	}
	function clearTexts() {
		document.getElementById("text_input").value = "";
		document.getElementById("text_output").value = "";
		saveTexts();
		hideMelodyPlayer();
		highlightActionButton("");
	}

	// --- Swap helpers ---
	function swapTexts() {
		var inp = document.getElementById('text_input');
		var out = document.getElementById('text_output');
		var tmp = inp.value;
		inp.value = out.value;
		out.value = tmp;
		saveTexts();
	}
	// --- Async action handlers ---
	function setButtonLoading(btn, loading) {
		if (loading) {
			btn.dataset.originalValue = btn.textContent;
			btn.textContent = "...";
			btn.disabled = true;
		} else {
			btn.textContent = btn.dataset.originalValue || btn.textContent;
			btn.disabled = false;
		}
	}

	function set_action(action) {
		currentAction = action;
		highlightActionButton(action);
		saveSettingsToSession();
	}

	async function doTransliterate() {
		var btn = document.getElementById("transliterate_button");
		setButtonLoading(btn, true);
		try {
			var fd = new FormData();
			fd.append("input_text", document.getElementById("text_input").value);
			fd.append("from_scheme", document.getElementById("from_scheme").value);
			fd.append("to_scheme", document.getElementById("to_scheme").value);
			fd.append("avoid_virama_indic_scripts", currentAvoidVirama);

			var resp = await fetch("/api/transliterate", {
				method: "POST",
				headers: {"Accept": "application/json"},
				body: fd,
			});
			var data = await resp.json();
			document.getElementById("text_output").value = data.result;
			saveTexts();
			set_action("transliterate");
			hideMelodyPlayer();
			closeSidebarOnMobile();
		} finally {
			setButtonLoading(btn, false);
		}
	}

	async function doScan() {
		var btn = document.getElementById("scan_button");
		setButtonLoading(btn, true);
		try {
			var s = getSidebarSettings();
			var fd = new FormData();
			fd.append("input_text", document.getElementById("text_input").value);
			fd.append("from_scheme", s.from_scheme);
			fd.append("show_weights", s.weights);
			fd.append("show_morae", s.morae);
			fd.append("show_gaRas", s.gaRas);
			fd.append("show_alignment", s.alignment);

			var resp = await fetch("/api/scan", {
				method: "POST",
				headers: {"Accept": "application/json"},
				body: fd,
			});
			var data = await resp.json();
			document.getElementById("text_output").value = data.result;
			saveTexts();
			set_action("scan");
			hideMelodyPlayer();
			closeSidebarOnMobile();
		} finally {
			setButtonLoading(btn, false);
		}
	}

	async function doIdentifyMeter() {
		var btn = document.getElementById("identify_meter_button");
		setButtonLoading(btn, true);
		try {
			var s = getSidebarSettings();
			var fd = new FormData();
			fd.append("input_text", document.getElementById("text_input").value);
			fd.append("from_scheme", s.from_scheme);
			fd.append("show_weights", s.weights);
			fd.append("show_morae", s.morae);
			fd.append("show_gaRas", s.gaRas);
			fd.append("show_alignment", s.alignment);
			fd.append("resplit_option", s.resplit_option);

			var resp = await fetch("/api/identify-meter", {
				method: "POST",
				headers: {"Accept": "application/json"},
				body: fd,
			});
			var data = await resp.json();
			document.getElementById("text_output").value = data.result;
			saveTexts();
			set_action("identify meter");

			// Update melody player from response
			currentMeterLabel = data.meter_label || "";
			currentMelodyOptions = data.melody_options || [];
			rebuildMelodyDropdown(currentMelodyOptions);
			if (currentMelodyOptions.length > 0) {
				showMelodyPlayer();
				update_melody();
			} else {
				hideMelodyPlayer();
			}
			closeSidebarOnMobile();
		} finally {
			setButtonLoading(btn, false);
		}
	}

	async function doSplit() {
		var btn = document.getElementById("split_button");
		setButtonLoading(btn, true);
		try {
			var s = getSidebarSettings();
			var fd = new FormData();
			fd.append("input_text", document.getElementById("text_input").value);
			fd.append("from_scheme", s.from_scheme);
			fd.append("to_scheme", s.to_scheme);
			fd.append("splitter_model", s.splitter_model);
			fd.append("preserve_compound_hyphens", currentPreserveCompoundHyphens);
			fd.append("preserve_punctuation", currentPreservePunctuation);
			fd.append("avoid_virama_indic_scripts", currentAvoidVirama);

			var resp = await fetch("/api/split", {
				method: "POST",
				headers: {"Accept": "application/json"},
				body: fd,
			});
			var data = await resp.json();
			if (!resp.ok) {
				alert(data.error || "Splitting failed (unknown error).");
				return;
			}
			document.getElementById("text_output").value = data.result;
			saveTexts();
			set_action("split");
			hideMelodyPlayer();
			closeSidebarOnMobile();
		} finally {
			setButtonLoading(btn, false);
		}
	}

	// --- Melody player (JS-driven) ---
	var currentMeterLabel = "{{ meter_label }}";
	var currentMelodyOptions = {{ melody_options | tojson }};

	var melodySelectElement = document.getElementById("melody_option");
	const audio_prefix = "/assets/melodies/";
	melodySelectElement.addEventListener("change", update_melody);

	function rebuildMelodyDropdown(options) {
		melodySelectElement.innerHTML = "";
		for (var i = 0; i < options.length; i++) {
			var opt = document.createElement("option");
			opt.value = options[i];
			opt.textContent = options[i];
			melodySelectElement.appendChild(opt);
		}
	}

	function update_melody() {
		var audioElement = document.getElementById("audio");
		var audio_src_selection = melodySelectElement.value;

		if (!audio_src_selection || !currentMeterLabel) {
			return;
		}

		audio_src_selection = audio_src_selection.replace(/ /g, "-");
		audio_src_selection = audio_src_selection.replace(/\./g, ""); // e.g. for H.V. Nagaraja Rao
		var audio_src_str = audio_prefix +
							currentMeterLabel +
							"-" +
							audio_src_selection +
							".mp3";
		audioElement.src = audio_src_str;
	}

	function showMelodyPlayer() {
		document.getElementById("melodyPlayer").classList.add("visible");
	}

	function hideMelodyPlayer() {
		currentMeterLabel = "";
		currentMelodyOptions = [];
		document.getElementById("melodyPlayer").classList.remove("visible");
	}

	// --- Initialization ---
	window.onload = function() {
		initSidebarFromSession({
			from_scheme: "{{ from_scheme }}",
			to_scheme: "{{ to_scheme }}",
			resplit_option: "{{ resplit_option }}",
			splitter_model: "{{ splitter_model|default('dharmamitra_2024_sept') }}",
			weights: {{ weights|default(1)|int }} === 1,
			morae: {{ morae|default(1)|int }} === 1,
			gaRas: {{ gaRas|default(1)|int }} === 1,
			alignment: {{ alignment|default(1)|int }} === 1,
		});

		highlightActionButton(currentAction);
		restoreTexts();

		// Initialize melody dropdown from server data (for examples)
		if (currentMelodyOptions.length > 0) {
			rebuildMelodyDropdown(currentMelodyOptions);
			showMelodyPlayer();
		}
		update_melody();
		window.scrollTo(0, 0);

		// Save text on any edit
		document.getElementById("text_input").addEventListener("input", saveTexts);
		document.getElementById("text_output").addEventListener("input", saveTexts);
	}

</script>
{% endblock %}
