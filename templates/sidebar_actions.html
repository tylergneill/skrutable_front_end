<!-- Transliterate + schemes -->
<div class="action-row">
	<button type="button" id="transliterate_button" class="btn btn-primary action-btn"
		onclick="onActionButton('transliterate');">Transliterate</button>
	<div class="action-options scheme-options-row">
		<div class="scheme-labels">
			<label class="scheme-label">in: <select id="from_scheme" onchange="onSidebarChange();">
				<optgroup label="Romanizations">
					<option value="IAST">IAST</option>
					<option value="HK">HK</option>
					<option value="SLP">SLP</option>
					<option value="ITRANS">ITRANS</option>
					<option value="VH">VH</option>
					<option value="WX">WX</option>
					<option value="IASTREDUCED" disabled>IAST reduced</option>
				</optgroup>
				<optgroup label="Indic Scripts">
					<option value="DEV">DEV</option>
					<option value="BENGALI">BENGALI</option>
					<option value="GUJARATI">GUJARATI</option>
				</optgroup>
			</select></label>
			<label class="scheme-label">out: <select id="to_scheme" onchange="onSidebarChange();">
				<optgroup label="Romanizations">
					<option value="IAST">IAST</option>
					<option value="HK">HK</option>
					<option value="SLP">SLP</option>
					<option value="ITRANS">ITRANS</option>
					<option value="VH">VH</option>
					<option value="WX">WX</option>
					<option value="IASTREDUCED">IAST reduced</option>
				</optgroup>
				<optgroup label="Indic Scripts">
					<option value="DEV">DEV</option>
					<option value="BENGALI">BENGALI</option>
					<option value="GUJARATI">GUJARATI</option>
				</optgroup>
			</select></label>
		</div>
		<button type="button" class="btn btn-primary btn-swap-scheme" onclick="swapSchemeSelects(); onSidebarChange();">&#8645;</button>
	</div>
</div>

<!-- Scan + detail checkboxes -->
<div class="action-row">
	<button type="button" id="scan_button" class="btn btn-primary action-btn"
		onclick="onActionButton('scan');">Scan</button>
	<div class="action-options">
		<div class="checkbox-group">
			<label><input type="checkbox" id="weights" checked onchange="onSidebarChange();"/> lglgl</label>
			<label><input type="checkbox" id="morae" checked onchange="onSidebarChange();"/> {mora}</label>
			<label><input type="checkbox" id="gaRas" checked onchange="onSidebarChange();"/> [ga&#7751;a]</label>
			<label><input type="checkbox" id="alignment" checked onchange="onSidebarChange();"/> align</label>
		</div>
	</div>
</div>

<!-- Identify Meter + resplit -->
<div class="action-row">
	<button type="button" id="identify_meter_button" class="btn btn-primary action-btn"
		onclick="onActionButton('identify meter');">Identify Meter</button>
	<div class="action-options">
		<select id="resplit_option" onchange="onSidebarChange();">
			<option value="none">don't resplit</option>
			<option value="resplit_lite">resplit lite</option>
			<option value="resplit_lite_keep_mid">resplit lite keep mid</option>
			<option value="resplit_max">resplit max</option>
			<option value="resplit_max_keep_mid">resplit max keep mid</option>
		</select>
	</div>
</div>

<!-- Split Words -->
<div class="action-row">
	<button type="button" id="split_button" class="btn btn-primary action-btn"
		onclick="onActionButton('split');">Split Words</button>
	<div class="action-options">
		<label class="scheme-label scheme-label-wide">model: <select id="splitter_model_sidebar" onchange="onSidebarChange();">
			<option value="dharmamitra_2024_sept">2024 ByT5-Sanskrit (Dharmamitra)</option>
			<option value="splitter_2018">2018 Sandhi and Compound Splitter</option>
		</select></label>
	</div>
</div>

<!-- Input mode toggle -->
<div class="sidebar-extras">
	<div class="input-toggle-row">
		<div class="input-toggle">
			<button type="button" id="toggle_text" class="toggle-btn {% if page_mode == 'workbench' %}active{% endif %}" onclick="onInputToggle('text');">Text Input</button>
			<button type="button" id="toggle_file" class="toggle-btn {% if page_mode != 'workbench' %}active{% endif %}" onclick="onInputToggle('file');">Upload File</button>
		</div>
		<a href="/upload_file_help" class="sidebar-help-link">?</a>
	</div>
	<div class="swap-buttons-grid" id="file_input_buttons" {% if page_mode == 'workbench' %}style="display:none;"{% endif %}>
		<button type="button" class="btn btn-primary" onclick="onUploadButton('transliterate');">Transliterate</button>
		<button type="button" class="btn btn-primary" onclick="onUploadButton('identify meter');">Identify Meter</button>
		<button type="button" class="btn btn-primary" onclick="onUploadButton('split');">Split Words</button>
		<a href="/ocr" class="btn btn-primary">PDF OCR</a>
	</div>
</div>
