<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="/assets/favicon.png">
	<link rel="stylesheet" href="/assets/css/skrutable.css">
	<script src="https://cdn.jsdelivr.net/npm/skrutable-js@2.1.4/dist/skrutable.bundle.js"></script>
	<title>skrutable — batch meter correction mode</title>
	<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
	<style>
		/* Override global height:100% so sticky children work throughout the page */
		html, body { height: auto; min-height: 100%; }
		body { padding: 0; margin: 0; }

		/* === Sticky header === */
		.bcm-header {
			position: sticky; top: 0; z-index: 100;
			background: var(--sidebar-bg); color: var(--sidebar-text);
			display: flex; align-items: center; justify-content: space-between;
			padding: 0.5em 1em; gap: 0.75em; flex-wrap: wrap;
		}
		.bcm-header-left { display: flex; align-items: center; gap: 0.75em; flex-wrap: wrap; }
		.bcm-header a { color: var(--sidebar-accent); font-size: 0.9em; }
		.bcm-header h1 { font-family: var(--font-heading); font-size: 1em; font-weight: normal; color: var(--sidebar-text); margin: 0; }
		.bcm-header-right { display: flex; gap: 0.5em; align-items: center; }

		/* === Stats block === */
		.bcm-stats-block {
			position: sticky; top: 2.8em; z-index: 90;
			/* Full-width sticky — margin breaks sticky, use padding instead */
			padding: 0.6em 1em 0 calc(18% + 1em);
			background: var(--body-bg, var(--pre-bg));
			margin: 0 0 1.25em 0;
		}
		.bcm-stats-summary {
			display: flex; gap: 1em; flex-wrap: wrap; align-items: center;
			font-size: 1em; padding: 0.55em 1em;
			background: var(--pre-bg); border-radius: 4px; border: 1px solid var(--input-border);
		}
		.bcm-stat       { color: var(--main-text); font-size: 1em; }
		.bcm-stat-dim   { color: var(--main-text); opacity: 0.5; font-size: 0.9em; }
		.bcm-stat-showing { display: block; font-size: 0.75em; font-weight: normal; opacity: 0.8; margin-top: 0.1em; text-align: center; }

		/* Filter pill buttons */
		.bcm-filter-btn {
			display: inline-flex; flex-direction: column; align-items: center; gap: 0.1em;
			padding: 0.25em 0.9em; border-radius: 999px; border: none;
			font-size: 0.9em; font-weight: 600; cursor: pointer;
			user-select: none; transition: opacity 0.15s, box-shadow 0.15s;
			box-shadow: inset 0 0 0 2px transparent;
		}
		.bcm-filter-btn.correct { background: #4caf50; color: #fff; }
		.bcm-filter-btn.needs-correction { background: #e05050; color: #fff; }
		.bcm-filter-btn.off { opacity: 0.45; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); filter: saturate(0.4); }
		.bcm-filter-btn:hover { filter: brightness(1.1); }
		.bcm-filter-spinner { font-size: 0.8em; display: none; }

		/* Refresh button */
		.btn-refresh {
			background: var(--btn-bg); color: var(--btn-text);
			border: 1px solid var(--input-border); border-radius: 4px;
			padding: 0.25em 0.7em; cursor: pointer; font-size: 0.9em;
			font-weight: 600; line-height: 1.4;
			transition: background 0.15s;
		}
		.btn-refresh:hover { background: var(--btn-bg-hover); }

		/* Nav arrow buttons */
		.btn-nav {
			background: var(--btn-bg); color: var(--btn-text);
			border: 1px solid var(--input-border); border-radius: 4px;
			padding: 0.2em 0.55em; cursor: pointer; font-size: 1em;
			line-height: 1.2; transition: background 0.15s;
		}
		.btn-nav:hover { background: var(--btn-bg-hover); }
		.btn-nav:disabled { opacity: 0.35; cursor: default; }

		/* === Meter type filter === */
		.bcm-meter-counts {
			margin-top: 0.4em; padding: 0.3em 0.75em 0.5em;
			background: var(--pre-bg); border-radius: 4px; border: 1px solid var(--input-border);
			font-size: 0.85em; color: var(--main-text); display: none;
		}
		.bcm-meter-counts.open { display: block; max-height: 40vh; overflow-y: auto; }
		.bcm-meter-counts-toggle {
			background: none; border: none; color: var(--link-color);
			cursor: pointer; font-size: 0.85em; padding: 0.4em 0.75em 0.7em;
			text-decoration: none; display: flex; align-items: center; gap: 0.4em;
			font-weight: 600; letter-spacing: 0.01em;
		}
		.bcm-meter-counts-toggle:hover { text-decoration: underline; }
		.bcm-filter-chips { display: inline-flex; flex-wrap: wrap; gap: 0.3em; margin-left: 0.4em; vertical-align: middle; }
		.bcm-filter-chip {
			display: inline-flex; align-items: center; gap: 0.25em;
			background: var(--input-border); border-radius: 999px;
			padding: 0.05em 0.5em 0.05em 0.6em; font-size: 0.8em;
			color: var(--main-text);
		}
		.bcm-filter-chip-x {
			background: none; border: none; cursor: pointer; padding: 0;
			font-size: 0.9em; line-height: 1; color: var(--main-text); opacity: 0.6;
		}
		.bcm-filter-chip-x:hover { opacity: 1; }
		.meter-filter-header {
			display: flex; align-items: center; gap: 0.5em;
			padding: 0.3em 0 0.3em; border-bottom: 2px solid var(--input-border);
			margin-bottom: 0.15em;
		}
		#cb-select-all { flex-shrink: 0; cursor: pointer; margin: 0; }
		.meter-count-row { display: flex; align-items: center; gap: 0.5em; padding: 0.15em 0; border-bottom: 1px solid var(--input-border); }
		.meter-count-row:last-child { border-bottom: none; }
		.meter-count-row.has-needs { background: rgba(224,80,80,0.08); border-radius: 2px; }
		[data-theme="dark"] .meter-count-row.has-needs { background: rgba(224,80,80,0.14); }
		.meter-count-row input[type=checkbox] { flex-shrink: 0; cursor: pointer; margin: 0; }
		.meter-count-label { flex: 1; cursor: pointer; }
		.meter-count-n { font-weight: bold; min-width: 3em; text-align: right; }
		.meter-count-needs { font-weight: bold; color: #e05050; min-width: 3.5em; text-align: right; }
		.meter-count-pct { color: #777; min-width: 3.5em; text-align: right; }

		/* === Verse list === */
		.bcm-verses {
			padding: 0 1em 4em;
			margin-left: 18%;   /* leave room for fixed panel column */
			display: flex; flex-direction: column; gap: 0.75em;
		}
		.bcm-hidden-notice { text-align: center; color: var(--main-text); opacity: 0.6; font-size: 0.85em; padding: 0.5em; }

		/* === Verse card === */
		.verse-card {
			border: 1px solid var(--input-border); border-radius: 4px;
			overflow: hidden; background: var(--input-bg);
			cursor: text; transition: box-shadow 0.15s;
		}
		.verse-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
		.verse-card.focused {
			box-shadow: 0 0 0 3px #f0c040, 0 4px 16px rgba(0,0,0,0.2);
			outline: none;
		}
		.verse-card.focused .verse-card-header {
			background: #f0c040 !important;
			color: #1a1a1a !important;
		}
		.verse-card.focused .verse-card-header .verse-status-dot {
			border: 1.5px solid rgba(0,0,0,0.3);
		}
		.verse-card.compact .verse-card-body { display: none; }
		.verse-card.compact .verse-card-header { font-size: 0.9em; padding: 0.25em 0.75em; cursor: pointer; }

		.verse-card-header {
			padding: 0.4em 0.75em; font-size: 1em;
			font-family: var(--font-heading);
			display: flex; align-items: baseline; justify-content: space-between; gap: 0.5em;
			cursor: pointer;
		}
		.verse-card-header { background: #395a77; color: #fff; }
		[data-theme="dark"] .verse-card-header { background: #2e4a64; color: #dde; }

		/* Status stripe: thick left border on the whole card */
		.verse-card.perfect  { border-left: 5px solid #4caf50; }
		.verse-card.imperfect { border-left: 5px solid #e05050; }
		.verse-card.unknown  { border-left: 5px solid #aaa; }

		/* Status dot: small colored circle before the label */
		.verse-status-dot {
			display: inline-block;
			width: 0.65em; height: 0.65em;
			border-radius: 50%;
			flex-shrink: 0;
			margin-right: 0.35em;
			vertical-align: middle;
		}
		.verse-card-header.perfect   .verse-status-dot { background: #4caf50; }
		.verse-card-header.imperfect .verse-status-dot { background: #e05050; }
		.verse-card-header.unknown   .verse-status-dot { background: #aaa; }
		.verse-num { font-size: 0.75em; font-weight: normal; opacity: 0.7; white-space: nowrap; }
		.verse-header-label { flex: 1; }

		.verse-card-body { display: flex; gap: 0; }

		/* === Left column: raw text (click-to-edit) === */
		.verse-raw {
			flex: 0 0 auto; width: 34%; min-width: 160px; max-width: 38%;
			box-sizing: border-box; border-right: 1px solid var(--input-border);
		}
		.verse-raw-text {
			padding: 0.5em 0.6em;
			font-family: var(--font-heading); font-size: 0.95em;
			white-space: pre-wrap; word-break: break-word;
			color: var(--main-text); min-height: 3em;
		}
		.verse-raw textarea {
			display: block; width: 100%; box-sizing: border-box;
			font-family: var(--font-heading); font-size: 0.95em;
			background: var(--input-bg); color: var(--main-text);
			border: none; border-left: 3px solid var(--btn-bg);
			padding: 0.5em 0.6em; resize: none; outline: none;
		}

		/* === Right column: L/G scansion === */
		.verse-scansion { flex: 1 1 auto; padding: 0.5em 0.75em; overflow-x: auto; }

		/* pāda row */
		.pada-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px; margin-bottom: 6px; }
		.pada-row.length-error { background: rgba(180,60,60,0.12); border-radius: 3px; padding: 3px; }
		[data-theme="dark"] .pada-row.length-error { background: rgba(220,80,80,0.18); }

		/* pāda row + mora + imperfect label all inline */
		.pada-row-wrap { display: flex; align-items: center; gap: 0.5em; margin-bottom: 6px; flex-wrap: nowrap; }
		.pada-row-wrap .pada-row { margin-bottom: 0; flex-shrink: 0; }

		/* imperfect label: shrinks to remaining space, text wraps internally */
		.pada-imperfect-label {
			font-size: 0.85em; color: #c0392b; font-style: italic;
			font-family: var(--font-heading);
			flex-shrink: 1; min-width: 0;
			line-height: 1.3; overflow-wrap: break-word;
			padding-left: 0.5em;
		}
		[data-theme="dark"] .pada-imperfect-label { color: #e07070; }

		/* gaṇa group: bracket under boxes + letter below */
		.gana-group { display: inline-flex; flex-direction: column; align-items: stretch; }
		.gana-group-boxes {
			display: inline-flex; gap: 2px;
			border-bottom: 2px solid #999;   /* bracket bottom line, adjacent to gana letter */
			padding-bottom: 2px;
		}
		[data-theme="dark"] .gana-group-boxes { border-bottom-color: #777; }
		.gana-label {
			text-align: center; font-size: 0.7em; color: #555;
			font-family: var(--font-body); line-height: 1.4; margin-top: 1px;
		}
		[data-theme="dark"] .gana-label { color: #aaa; }
		/* single-char (guru/laghu after gaṇas) */
		.gana-single { display: inline-flex; flex-direction: column; align-items: center; }
		.gana-single-box { padding-bottom: 4px; } /* align with bracketed groups */
		.gana-single .gana-label { visibility: hidden; } /* keeps spacing consistent */

		/* syllable box */
		.syl-box {
			display: inline-grid; border: 1px ridge #fff;
			background: #CCC; min-width: 2em; text-align: center;
		}
		[data-theme="dark"] .syl-box { background: #444; border-color: #666; }
		.syl-box .scan { grid-row: 1; text-align: center; font-size: 0.72em; padding: 0 2px; }
		.syl-box .syl  { grid-row: 2; font-size: 0.95em; padding: 1px 3px; font-family: var(--font-heading); }
		/* L = bold blue, G = bold darkred */
		.syl-box.L .scan { color: #2255bb; font-weight: bold; }
		.syl-box.G .scan { color: #8b0000; font-weight: bold; }
		[data-theme="dark"] .syl-box.L .scan { color: #6699dd; }
		[data-theme="dark"] .syl-box.G .scan { color: #dd6666; }
		.syl-box.problem { background: #e8a0a0; }
		[data-theme="dark"] .syl-box.problem { background: #7a3030; }

		/* mora annotation — inline after the pāda row */
		.pada-mora { font-size: 0.8em; color: #777; white-space: nowrap; align-self: flex-end; padding-bottom: 2px; }
		[data-theme="dark"] .pada-mora { color: #999; }

		.verse-scansion.stale { opacity: 0.35; }

		/* === Tool panel (fixed in left column, slides to align with focused card) === */
		.bcm-panel {
			position: fixed;
			left: 1em;
			right: 83%;
			top: 4em;    /* updated by JS */
			background: var(--sidebar-bg);
			color: var(--sidebar-text);
			border-radius: 6px;
			padding: 0.5rem 0.75rem;
			box-shadow: 0 4px 16px rgba(0,0,0,0.3);
			z-index: 50;
			visibility: hidden;
			transition: top 0.18s ease;
		}
		.bcm-panel.visible { visibility: visible; }
		.panel-section-top {
			padding-bottom: 0.4em;
			margin-bottom: 0.4em;
			border-bottom: 1px solid rgba(255,255,255,0.15);
		}
		.panel-section-bottom {
			display: flex; flex-direction: column; gap: 0.3em;
		}
		.bcm-panel .checkbox-group {
			display: grid; grid-template-columns: 1fr 1fr; gap: 0.1em 0.75em;
			font-size: 0.85em;
		}
		.bcm-panel .checkbox-group label { white-space: nowrap; cursor: pointer; }
		#panel-resplit {
			width: 100%; font-size: 0.85em;
			background: var(--input-bg); color: var(--main-text);
			border: 1px solid var(--input-border); border-radius: 3px;
			padding: 0.25em 0.4em;
		}
		#panel-resplit:disabled { opacity: 0.4; cursor: default; }

		/* === Header buttons === */
		/* === Mode pill toggle — matches main page input-toggle === */
		.panel-mode-toggle {
			display: flex;
			border-radius: 20px;
			overflow: hidden;
			background: var(--sidebar-bg-dark);
			padding: 2px;
			margin-bottom: 0.4em;
		}
		.panel-mode-btn {
			flex: 1;
			padding: 0.25rem 0.4rem;
			font-size: 0.8rem;
			border: none;
			border-radius: 20px;
			background: transparent;
			color: var(--sidebar-accent);
			cursor: pointer;
			transition: background 0.15s, color 0.15s;
		}
		.panel-mode-btn.active {
			background: var(--sidebar-text);
			color: var(--sidebar-bg-dark);
		}

		.btn-export {
			background: var(--btn-bg); color: var(--btn-text);
			border: none; border-radius: 3px; padding: 0.3em 0.7em;
			cursor: pointer; font-size: 0.85em;
		}
		.btn-export:hover { background: var(--btn-bg-hover); }
		.btn-theme {
			background: none; border: 1px solid var(--sidebar-accent);
			color: var(--sidebar-accent); border-radius: 3px;
			padding: 0.2em 0.5em; cursor: pointer; font-size: 0.9em;
		}
		.btn-theme:hover { background: rgba(255,255,255,0.1); }
	</style>
</head>
<body>

<div class="bcm-header">
	<div class="bcm-header-left">
		<a href="/">&larr; workbench</a>
		<h1>batch meter correction mode</h1>
	</div>
	<div class="bcm-header-right">
		<label style="font-size:0.85em;color:var(--sidebar-text);display:flex;align-items:center;gap:0.3em;">
			display:
			<select id="display-scheme" style="font-size:1em;padding:0.15em 0.3em;border-radius:3px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--main-text);">
				<option value="IAST" selected>IAST</option>
				<option value="SLP">SLP</option>
				<option value="DEV">DEV</option>
				<option value="HK">HK</option>
			</select>
		</label>
		<button class="btn-export" onclick="exportTxt()">export .txt</button>
		<button class="btn-export" onclick="exportCsv()">export .csv</button>
		<button class="btn-theme" id="dark-mode-toggle" title="Toggle dark mode">&#9790;</button>
	</div>
</div>

<div class="bcm-stats-block">
	<div class="bcm-stats-summary" id="bcm-stats-summary">
		<!-- nav arrows appended here by JS, after the pills -->
	</div>
	<div style="display:flex;align-items:center;flex-wrap:wrap;">
		<button class="bcm-meter-counts-toggle" id="meter-counts-toggle" onclick="toggleMeterCounts()">&#9654; meter type filter</button>
		<span class="bcm-filter-chips" id="bcm-filter-chips"></span>
	</div>
	<div class="bcm-meter-counts" id="bcm-meter-counts"></div>
</div>

<div class="bcm-verses" id="bcm-verses"></div>

<!-- Floating tool panel (left side) -->
<div class="bcm-panel" id="bcm-panel">
	<div class="panel-section-top">
		<div class="checkbox-group">
			<label><input type="checkbox" id="panel-weights" checked> lglgl</label>
			<label><input type="checkbox" id="panel-morae"> {mora}</label>
			<label><input type="checkbox" id="panel-garas" checked> [ga&#7751;a]</label>
			<label><input type="checkbox" id="panel-align"> align</label>
		</div>
	</div>
	<div class="panel-section-bottom">
		<div class="panel-mode-toggle" id="panel-mode-toggle">
			<button class="panel-mode-btn" id="btn-mode-scan" onclick="setMode('scan')">Scan</button>
			<button class="panel-mode-btn active" id="btn-mode-identify" onclick="setMode('identify')">Identify</button>
		</div>
		<select id="panel-resplit">
			<option value="none">don't resplit</option>
			<option value="resplit_lite">resplit lite</option>
			<option value="resplit_lite_keep_mid" selected>resplit lite keep mid</option>
			<option value="resplit_max">resplit max</option>
			<option value="resplit_max_keep_mid">resplit max keep mid</option>
		</select>
	</div>
</div>

<script>
(function() {
	var _pageStart = performance.now();

	// Fix URL without a reload
	if (window.history && window.history.replaceState) {
		window.history.replaceState(null, '', '/batch-meter-correction');
	}

	// --- Dark mode ---
	var toggle = document.getElementById('dark-mode-toggle');
	function applyTheme(dark) {
		document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
		toggle.innerHTML = dark ? '&#9788;' : '&#9790;';
		toggle.title = dark ? 'Toggle light mode' : 'Toggle dark mode';
		localStorage.setItem('theme', dark ? 'dark' : 'light');
	}
	toggle.addEventListener('click', function() {
		applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
	});
	if (localStorage.getItem('theme')) applyTheme(localStorage.getItem('theme') === 'dark');

	// --- Data ---
	var batchData = {{ batch_data_json | safe }};
	var verses = batchData.verses || [];
	var settings = batchData.settings || {};
	var duration = batchData.duration_secs;

	// --- Per-verse options state ---
	// Initialize all verses with the session defaults, then each card tracks its own.
	var defaultOpts = {
		weights:        settings.weights  !== undefined ? !!settings.weights  : true,
		morae:          settings.morae    !== undefined ? !!settings.morae    : false,
		gaRas:          settings.gaRas    !== undefined ? !!settings.gaRas    : true,
		alignment:      settings.alignment !== undefined ? !!settings.alignment : false,
		resplit_option: settings.resplit_option || 'resplit_lite_keep_mid',
	};
	var verseOpts = verses.map(function() { return Object.assign({}, defaultOpts); });

	function getPanelOpts() {
		return {
			weights:        document.getElementById('panel-weights').checked,
			morae:          document.getElementById('panel-morae').checked,
			gaRas:          document.getElementById('panel-garas').checked,
			alignment:      document.getElementById('panel-align').checked,
			resplit_option: document.getElementById('panel-resplit').value,
		};
	}

	function setPanelOpts(opts) {
		document.getElementById('panel-weights').checked = opts.weights;
		document.getElementById('panel-morae').checked   = opts.morae;
		document.getElementById('panel-garas').checked   = opts.gaRas;
		document.getElementById('panel-align').checked   = opts.alignment;
		document.getElementById('panel-resplit').value   = opts.resplit_option;
	}

	// Seed panel with defaults on load
	setPanelOpts(defaultOpts);
	document.getElementById('panel-resplit').disabled = false; // identify is default

	// --- Mode toggle (Scan / Identify) ---
	var currentMode = 'identify';
	window.setMode = function(mode) {
		currentMode = mode;
		document.getElementById('btn-mode-scan').classList.toggle('active', mode === 'scan');
		document.getElementById('btn-mode-identify').classList.toggle('active', mode === 'identify');
		document.getElementById('panel-resplit').disabled = (mode === 'scan');
		// Scan results never come preloaded — always need an API call when switching to scan.
		// Switching back to identify restores the preloaded result; just re-render from verseState.
		if (focusedIndex !== null) {
			if (mode === 'scan') scheduleAutoRun();
			else updateCardScansion(focusedIndex);
		}
	};

	// --- skrutable-js transliterator ---
	var T = new Skrutable.Transliterator();
	function transliterate(text, fromScheme, toScheme) {
		return T.transliterate(text, fromScheme, toScheme);
	}

	// --- Display scheme ---
	var displayScheme = 'IAST';

	function slpToDisplay(s, scheme) {
		if (!s || scheme === 'SLP') return s;
		return transliterate(s, 'SLP', scheme);
	}

	document.getElementById('display-scheme').addEventListener('change', function() {
		displayScheme = this.value;
		// Re-render scansion for all visible cards using each card's own opts
		verseState.forEach(function(_, idx) {
			var scanDiv = document.getElementById('verse-scan-' + idx);
			if (scanDiv) {
				scanDiv.innerHTML = '';
				renderScansion(scanDiv, verseState[idx], verseOpts[idx]);
			}
		});
	});

	var PERFECT_SCORE = 9;
	function isPerfect(v) { return (v.identification_score || 0) >= PERFECT_SCORE; }
	function isUnknown(v) { return !v.meter_label || v.meter_label.indexOf('adhyavasitam') >= 0; }
	function meterBase(v) { return (v.meter_label || 'na ki\u1e43cid adhyavasitam').split(' (')[0].trim(); }

	// Mutable state per verse
	var verseState = verses.map(function(v) {
		var s = Object.assign({}, v);
		if (s.text_raw) s.text_raw = s.text_raw.replace(/(\s+[/|।])\s+/g, '$1\n\n');
		return s;
	});

	// --- Stats ---
	var perfectCount = verses.filter(isPerfect).length;
	var needsCount   = verses.length - perfectCount;

	var meterCounts = {};
	var meterNeedsCounts = {};
	verses.forEach(function(v) {
		var base = meterBase(v);
		meterCounts[base] = (meterCounts[base] || 0) + 1;
		if (!isPerfect(v)) meterNeedsCounts[base] = (meterNeedsCounts[base] || 0) + 1;
	});
	var meterList = Object.keys(meterCounts).map(function(k) {
		return { label: k, n: meterCounts[k], needs: meterNeedsCounts[k] || 0 };
	}).sort(function(a, b) { return b.n - a.n; });

	function fmt(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

	function pillHTML(label, spinId, showingId) {
		return '<span>' + label + ' <span class="bcm-filter-spinner" id="' + spinId + '">&#8987;</span></span>' +
			'<span class="bcm-stat-showing" id="' + showingId + '" style="display:none"></span>';
	}

	function scrollToCard(card) {

		var panelTop = (statsBlock ? statsBlock.getBoundingClientRect().bottom : 0) + 8;
		window.scrollTo({ top: card.getBoundingClientRect().top + window.scrollY - panelTop, behavior: 'smooth' });
		panel.style.top = panelTop + 'px';
	}

	function applyMeterFilter() {
		var noneSelected = meterList.every(function(m) { return meterFilter[m.label] === false; });
		if (noneSelected) meterList.forEach(function(m) { meterFilter[m.label] = true; });
		expandedPerfect = {};

	}

	var statsEl = document.getElementById('bcm-stats-summary');

	// Meter filter state: set of labels currently shown (all selected initially)
	var meterFilter = {};
	meterList.forEach(function(m) { meterFilter[m.label] = true; });
	// Pending state while dropdown is open
	var meterFilterPending = null;

	var countsEl = document.getElementById('bcm-meter-counts');

	// Header row: indeterminate select-all checkbox
	var filterHeader = document.createElement('div');
	filterHeader.className = 'meter-filter-header';
	var cbSelectAll = document.createElement('input');
	cbSelectAll.type = 'checkbox';

	cbSelectAll.addEventListener('click', function() {
		// On click: if all checked → uncheck all; otherwise → check all
		var allChecked = meterList.every(function(m) {
			var cb = document.getElementById('mcb-' + m.label);
			return cb && cb.checked;
		});
		var target = !allChecked;
		meterList.forEach(function(m) {
			var cb = document.getElementById('mcb-' + m.label);
			if (cb) cb.checked = target;
			meterFilterPending[m.label] = target;
		});
		updateSelectAllCb();
	});
	filterHeader.appendChild(cbSelectAll);
	countsEl.appendChild(filterHeader);

	function updateSelectAllCb() {
		var checkedCount = meterList.filter(function(m) {
			var cb = document.getElementById('mcb-' + m.label);
			return cb && cb.checked;
		}).length;
		if (checkedCount === 0) {
			cbSelectAll.checked = false;
			cbSelectAll.indeterminate = false;
		} else if (checkedCount === meterList.length) {
			cbSelectAll.checked = true;
			cbSelectAll.indeterminate = false;
		} else {
			cbSelectAll.checked = false;
			cbSelectAll.indeterminate = true;
		}
	}

	meterList.forEach(function(m) {

		var lbl = document.createElement('label');

		row.appendChild(pctSpan);

		countsEl.appendChild(row);

	function updateFilterUI() {
		var allOn = meterList.every(function(m) { return meterFilter[m.label] !== false; });

		// Compute filtered counts
		var shownTotal = 0, shownCorrect = 0, shownNeeds = 0;
		meterList.forEach(function(m) {
			if (meterFilter[m.label] !== false) {
				shownTotal   += m.n;
				shownCorrect += (m.n - m.needs);
				shownNeeds   += m.needs;
			}
		});

		// Update "showing N" sub-labels — hide when all meters shown
		var elTotal   = document.getElementById('showing-total');
		var elCorrect = document.getElementById('showing-correct');
		var elNeeds   = document.getElementById('showing-needs');
		if (elTotal)   { elTotal.textContent   = allOn ? '' : 'showing ' + fmt(shownTotal);   elTotal.style.display   = allOn ? 'none' : 'block'; }
		if (elCorrect) { elCorrect.textContent = allOn ? '' : 'showing ' + fmt(shownCorrect); elCorrect.style.display = allOn ? 'none' : 'block'; }
		if (elNeeds)   { elNeeds.textContent   = allOn ? '' : 'showing ' + fmt(shownNeeds);   elNeeds.style.display   = allOn ? 'none' : 'block'; }

		// Update chips row — show one chip per selected meter with × to deselect
		var chipsEl = document.getElementById('bcm-filter-chips');
		if (!chipsEl) return;
		chipsEl.innerHTML = '';
		if (!allOn) {
			var chipCount = 0;
			meterList.forEach(function(m) {
				if (meterFilter[m.label] === false) return;
				if (chipCount >= 5) return;
				chipCount++;
				var chip = document.createElement('span');
				chip.className = 'bcm-filter-chip';
				chip.textContent = m.label + '\u00a0';
				var x = document.createElement('button');
				x.className = 'bcm-filter-chip-x';
				x.textContent = '\u00d7';
				x.title = 'Deselect ' + m.label;
				x.addEventListener('click', function() {
					meterFilter[m.label] = false;
					// Keep pending in sync so closing the dropdown doesn't undo this
					if (meterFilterPending) meterFilterPending[m.label] = false;
					// Sync checkbox if dropdown is open
					var cb = document.getElementById('mcb-' + m.label);
					if (cb) { cb.checked = false; updateSelectAllCb(); }
					applyMeterFilter();
				});
				chip.appendChild(x);
				chipsEl.appendChild(chip);
			});
			var totalSelected = meterList.filter(function(m) { return meterFilter[m.label] !== false; }).length;
			if (totalSelected > 5) {
				var more = document.createElement('span');
				more.className = 'bcm-filter-chip';
				more.style.opacity = '0.6';
				more.textContent = '+' + (totalSelected - 5) + ' more';
				chipsEl.appendChild(more);
			}
		}
	}

	window.toggleMeterCounts = function() {
		var el = document.getElementById('bcm-meter-counts');
		var btn = document.getElementById('meter-counts-toggle');
		var open = el.classList.toggle('open');
		btn.innerHTML = (open ? '&#9660;' : '&#9654;') + ' meter type filter';
		if (open) {
			var allOn = meterList.every(function(m) { return meterFilter[m.label] !== false; });
			if (allOn) {
				// No active filter: show all boxes unchecked so user picks what to include
				meterFilterPending = {};
				meterList.forEach(function(m) { meterFilterPending[m.label] = false; });
			} else {
				meterFilterPending = Object.assign({}, meterFilter);
			}
			meterList.forEach(function(m) {
				var cb = document.getElementById('mcb-' + m.label);
				if (cb) cb.checked = !!meterFilterPending[m.label];
			});
			updateSelectAllCb();
		} else {
			// On close: nothing checked = revert to all-on; otherwise apply selection
			var noneChecked = meterList.every(function(m) { return meterFilterPending[m.label] === false; });
			if (noneChecked) {
				meterList.forEach(function(m) { meterFilter[m.label] = true; });
			} else {
				meterFilter = Object.assign({}, meterFilterPending);
			}
			applyMeterFilter();
			meterFilterPending = null;
		}
	};

	// --- Header label: just base meter name, no diagnostic detail ---
	function buildHeaderLabel(v) {
		var lbl = v.meter_label || 'unidentified';
		// Strip the parenthetical detail, keep only the base name
		var base = lbl.split(' (')[0].trim();
		return base || lbl;
	}

	// --- Diagnostic helpers ---
	function getPadaDiag(diag, padaIdx) {
		if (!diag) return null;
		var halfKey    = (padaIdx <= 1) ? 'ab' : 'cd';
		var withinHalf = (padaIdx % 2 === 0) ? 'odd' : 'even';
		var d = diag[halfKey];
		if (!d) return null;
		return { d: d, withinHalf: withinHalf };
	}
	function isLengthError(fc) { return fc === 'hypermetric' || fc === 'hypometric'; }

	// --- Card building ---
	var container = document.getElementById('bcm-verses');
	var currentView = 'errors';
	var focusedIndex = null;
	var editingIndex = null;

	function buildCardBody(card, idx) {
		var v = verseState[idx];
		var body = document.createElement('div');
		body.className = 'verse-card-body';

		var rawDiv = document.createElement('div');
		rawDiv.className = 'verse-raw';
		rawDiv.id = 'verse-raw-' + idx;
		var textDiv = document.createElement('div');
		textDiv.className = 'verse-raw-text';
		textDiv.id = 'verse-raw-text-' + idx;
		textDiv.textContent = v.text_raw || '';
		textDiv.title = 'Click to edit';
		textDiv.addEventListener('click', function(e) { e.stopPropagation(); startEdit(idx); });
		rawDiv.appendChild(textDiv);
		body.appendChild(rawDiv);

		// Right: scansion
		var scanDiv = document.createElement('div');
		scanDiv.className = 'verse-scansion';
		scanDiv.id = 'verse-scan-' + idx;
		renderScansion(scanDiv, v, verseOpts[idx]);
		body.appendChild(scanDiv);

		card.appendChild(body);
	}

	function buildCard(idx, compact) {
		var v = verseState[idx];
		var perf = isPerfect(v);
		var unk  = isUnknown(v);
		var hdrClass = unk ? 'unknown' : (perf ? 'perfect' : 'imperfect');

		var card = document.createElement('div');
		card.className = 'verse-card ' + hdrClass + (compact ? ' compact' : '');
		card.id = 'verse-card-' + idx;
		card.dataset.idx = idx;

		// Header
		var hdr = document.createElement('div');
		hdr.className = 'verse-card-header ' + hdrClass;
		hdr.innerHTML =
			'<span class="verse-status-dot"></span>' +
			'<span class="verse-header-label">' + escHtml(buildHeaderLabel(v)) + '</span>' +
			'<span class="verse-num">#' + (idx + 1) + '</span>';
		hdr.addEventListener('click', function(e) {
			e.stopPropagation();
			var c = document.getElementById('verse-card-' + idx);
			if (c && c.classList.contains('compact')) {
				expandedPerfect[idx] = true;
				c.classList.remove('compact');
				// Build body lazily now that it's needed
				if (!document.getElementById('verse-scan-' + idx)) buildCardBody(c, idx);
			}
			focusCard(idx);
		});
		card.appendChild(hdr);

		// Body: only built immediately for non-compact cards
		if (!compact) buildCardBody(card, idx);

		// Click on card (not header/text) also focuses
		card.addEventListener('click', function(e) { e.stopPropagation(); focusCard(idx); });

		return card;
	}

	function updateCardHeader(idx) {
		var v = verseState[idx];
		var card = document.getElementById('verse-card-' + idx);
		if (!card) return;
		var hdr = card.querySelector('.verse-card-header');
		var perf = isPerfect(v), unk = isUnknown(v);
		var statusClass = unk ? 'unknown' : perf ? 'perfect' : 'imperfect';
		card.className = 'verse-card ' + statusClass + (card.classList.contains('focused') ? ' focused' : '') + (card.classList.contains('compact') ? ' compact' : '');
		hdr.className = 'verse-card-header ' + statusClass;
		hdr.innerHTML =
			'<span class="verse-status-dot"></span>' +
			'<span class="verse-header-label">' + escHtml(buildHeaderLabel(v)) + '</span>' +
			'<span class="verse-num">#' + (idx + 1) + '</span>';

	function updateCardScansion(idx) {
		var scanDiv = document.getElementById('verse-scan-' + idx);
		if (!scanDiv) return;
		scanDiv.classList.remove('stale');
		scanDiv.innerHTML = '';
		renderScansion(scanDiv, verseState[idx], verseOpts[idx]);
	}

	function renderScansion(el, v, opts) {
		// Use per-card options (fall back to panel state if not provided)
		opts = opts || getPanelOpts();
		var optWeights   = opts.weights;
		var optMorae     = opts.morae;
		var optGaRas     = opts.gaRas;
		var optAlignment = opts.alignment;

		var sylPadas  = (v.text_syllabified  || '').split('\n').map(function(p) { return p.trim(); });
		var wtPadas   = (v.syllable_weights   || '').split('\n').map(function(p) { return p.trim(); });
		var gaRaPadas = (v.gaRa_abbreviations || '').split('\n').map(function(p) { return p.trim(); });
		var morae     = v.morae_per_line || [];
		var diag      = v.diagnostic || null;
		var isUpajati    = v.meter_label && v.meter_label.indexOf('upaj\u0101ti') >= 0;
		var isJati       = !isUpajati && v.meter_label && (
			v.meter_label.indexOf('j\u0101ti') >= 0 ||   // āryājāti, etc.
			v.meter_label.indexOf('\u0101ry\u0101') >= 0 || // āryā
			v.meter_label.indexOf('g\u012bti') >= 0 ||   // gīti, upagīti, udgīti
			v.meter_label.indexOf('vait\u0101l\u012bya') >= 0 || // vaitālīya class
			v.meter_label.indexOf('m\u0101tr\u0101') >= 0  // mātrā- prefix meters
		);
		var isUnknownM   = !v.meter_label || v.meter_label.indexOf('adhyavasitam') >= 0;
		var isAnustubh   = v.meter_label && (
			v.meter_label.indexOf('anu\u1e63\u1e6dubh') >= 0 ||
			v.meter_label.indexOf('anustubh') >= 0 ||
			v.meter_label.indexOf('ardham eva') >= 0
		);
		// Mora only meaningful for jāti (counts define the meter) and unknown (diagnostic aid)
		// Suppress for anuṣṭubh, samavṛtta, ardhasamavṛtta, upajāti
		var showMora = isJati || isUnknownM;

		// Half-anuṣṭubh (ardham eva): library gives 4 pādas of 4 syls → show as 2 pādas of 8
		if (isAnustubh && v.meter_label.indexOf('ardham eva') >= 0 && sylPadas.length === 4) {
			sylPadas  = [sylPadas[0]  + ' ' + sylPadas[1],  sylPadas[2]  + ' ' + sylPadas[3]];
			wtPadas   = [wtPadas[0]   + wtPadas[1],          wtPadas[2]   + wtPadas[3]];
			gaRaPadas = [gaRaPadas[0] + gaRaPadas[1],        gaRaPadas[2] + gaRaPadas[3]];
			morae     = morae.length >= 4 ? [morae[0] + morae[1], morae[2] + morae[3]] : morae;
		}

		var numPadas  = Math.max(sylPadas.length, wtPadas.length);

		for (var p = 0; p < numPadas; p++) {
			var sylStr   = sylPadas[p]  || '';
			var wtStr    = wtPadas[p]   || '';
			var gaRaStr  = gaRaPadas[p] || '';
			var moraeVal = morae[p];
			if (!sylStr && !wtStr) continue;

			var padaDiag   = getPadaDiag(diag, p);
			var d          = padaDiag ? padaDiag.d : null;
			var withinHalf = padaDiag ? padaDiag.withinHalf : null;
			var probSet    = {};
			if (d && d.problem_syllables && withinHalf && d.problem_syllables[withinHalf]) {
				d.problem_syllables[withinHalf].forEach(function(i) { probSet[i] = true; });
			}
			// Only tint row red if THIS pāda has problem syllables (not just because its half does)
			var lenError = d && isLengthError(d.failure_code) && Object.keys(probSet).length > 0;

			// Imperfect label: show on the pāda where problem syllables are highlighted.
			// For rule failures: show on the 'odd' pāda if odd has problems, else 'even'.
			// For length errors: show on the 'even' pāda (last of the half).
			// Fall back to 'even' if unclear.
			var imperfectLabel = null;
			if (d) {
				imperfectLabel = d.imperfect_id_label ||
					(d.failure_code && !d.perfect_id_label ? d.failure_code : null);
			}
			var showImperfect = false;
			if (imperfectLabel && d) {
				// Show label on whichever pāda has non-empty problem_syllables.
				// For length errors the whole row is tinted, but label still goes on the affected pāda.
				var oddProbs  = d.problem_syllables && d.problem_syllables['odd']  && d.problem_syllables['odd'].length  > 0;
				var evenProbs = d.problem_syllables && d.problem_syllables['even'] && d.problem_syllables['even'].length > 0;
				if (oddProbs  && withinHalf === 'odd')  showImperfect = true;
				else if (evenProbs && withinHalf === 'even') showImperfect = true;
				else if (!oddProbs && !evenProbs) showImperfect = (withinHalf === 'even' || numPadas <= 2);
			}

			var sylList   = sylStr.split(' ').filter(function(s) { return s.length > 0; });
			var wtList    = wtStr.split('').filter(function(c)  { return 'lgLG'.indexOf(c) >= 0; });
			var ganaChars = gaRaStr ? gaRaStr.split('') : [];
			var numSyls   = Math.max(sylList.length, wtList.length);

			function makeSylBox(j) {
				var syl    = slpToDisplay(sylList[j] || '', displayScheme);
				var wt     = wtList[j]  || '';
				var isL    = wt.toUpperCase() === 'L';
				var isG    = wt.toUpperCase() === 'G';
				var isProb = !lenError && probSet[j];
				var box    = document.createElement('div');
				// Only color L/G if weights visible
				box.className = 'syl-box ' + (optWeights && isL ? 'L' : optWeights && isG ? 'G' : '') + (isProb ? ' problem' : '');
				if (optWeights) {
					var sc = document.createElement('div'); sc.className = 'scan';
					sc.textContent = isL ? 'l' : isG ? 'g' : wt;
					box.appendChild(sc);
				}
				if (optAlignment) {
					var sy = document.createElement('div'); sy.className = 'syl';
					sy.textContent = syl;
					box.appendChild(sy);
				}
				return box;
			}

			// Bare single syllable with no gaṇa label below (for anceps positions)
			function makeBareBox(j) {
				var wrap = document.createElement('div');
				wrap.className = 'gana-single';
				var boxWrap = document.createElement('div');
				boxWrap.className = 'gana-single-box';
				boxWrap.appendChild(makeSylBox(j));
				wrap.appendChild(boxWrap);
				var lbl = document.createElement('div');
				lbl.className = 'gana-label'; lbl.innerHTML = '&nbsp;';
				wrap.appendChild(lbl);
				return wrap;
			}

			// Gaṇa group: bracket + label below covering 3 syllables starting at sylIdx
			function makeGanaGroup(gChar, startIdx) {
				var group = document.createElement('div');
				group.className = 'gana-group';
				var boxes = document.createElement('div');
				boxes.className = 'gana-group-boxes';
				for (var k = 0; k < 3 && startIdx + k < numSyls; k++) {
					boxes.appendChild(makeSylBox(startIdx + k));
				}
				group.appendChild(boxes);
				var lbl = document.createElement('div');
				lbl.className = 'gana-label';
				lbl.textContent = gChar;
				group.appendChild(lbl);
				return group;
			}

			var row = document.createElement('div');
			row.className = 'pada-row' + (lenError ? ' length-error' : '');

			// Derive gaṇa name from 3-syllable weight pattern (lowercase l/g)
			var GANA_FROM_WEIGHTS = {
				'lll': 'n', 'llg': 't', 'lgl': 'j', 'lgg': 'y',
				'gll': 'B', 'glg': 'r', 'ggl': 's', 'ggg': 'm'
			};
			function ganaNameFromWeights(wList, start) {
				var pat = '';
				for (var k = 0; k < 3; k++) pat += (wList[start + k] || '').toLowerCase();
				return GANA_FROM_WEIGHTS[pat] || '?';
			}

			if (!optGaRas || ganaChars.length === 0) {
				// No gaṇa grouping — plain syllable boxes
				for (var j = 0; j < numSyls; j++) row.appendChild(makeSylBox(j));
			} else if (isAnustubh && numSyls === 8 && ganaChars.length === 4) {
				// Anuṣṭubh: group syls 1-3 and 4-6, leave syls 0 and 7 bare (anceps)
				// Recompute gaṇa names from actual weights at those positions
				var g1 = ganaNameFromWeights(wtList, 1);
				var g2 = ganaNameFromWeights(wtList, 4);
				row.appendChild(makeBareBox(0));
				row.appendChild(makeGanaGroup(g1, 1));
				row.appendChild(makeGanaGroup(g2, 4));
				row.appendChild(makeBareBox(7));
			} else {
				// Samavṛtta / other: gaṇas from syl 0, then singles with labels for remainder
				var triCount    = Math.floor(numSyls / 3);
				var numTriGanas = Math.min(triCount, ganaChars.length);
				var sylIdx = 0;
				for (var gi = 0; gi < numTriGanas; gi++) {
					row.appendChild(makeGanaGroup(ganaChars[gi], sylIdx));
					sylIdx += 3;
				}
				var singleChars = ganaChars.slice(numTriGanas);
				singleChars.forEach(function(gChar) {
					var wrap = document.createElement('div');
					wrap.className = 'gana-single';
					var boxWrap = document.createElement('div');
					boxWrap.className = 'gana-single-box';
					if (sylIdx < numSyls) boxWrap.appendChild(makeSylBox(sylIdx++));
					wrap.appendChild(boxWrap);
					var lbl = document.createElement('div');
					lbl.className = 'gana-label';
					lbl.textContent = gChar;
					wrap.appendChild(lbl);
					row.appendChild(wrap);
				});
				// Any remaining syllables beyond gaṇa coverage
				while (sylIdx < numSyls) { row.appendChild(makeSylBox(sylIdx++)); }
			}

			// Boxes row + mora + imperfect label all inline, vertically centered
			var wrap = document.createElement('div');
			wrap.className = 'pada-row-wrap';
			wrap.appendChild(row);
			if (optMorae && showMora && moraeVal !== undefined) {
				var mora = document.createElement('span');
				mora.className = 'pada-mora';
				mora.textContent = 'm:\u202f' + moraeVal;
				wrap.appendChild(mora);
			}
			if (showImperfect) {
				var ilbl = document.createElement('span');
				ilbl.className = 'pada-imperfect-label';
				ilbl.textContent = imperfectLabel;
				wrap.appendChild(ilbl);
			}
			el.appendChild(wrap);
		}
	}

	// --- View management ---
	// Two independent booleans: show correct / show needs-correction
	var showCorrect = false;
	var showNeeds   = true;
	var expandedPerfect = {};

	function updateFilterButtons() {
		var bc = document.getElementById('btn-filter-correct');
		var bn = document.getElementById('btn-filter-needs');
		if (bc) bc.classList.toggle('off', !showCorrect);
		if (bn) bn.classList.toggle('off', !showNeeds);
	}

	function triggerRender(spinId) {
		var spin = document.getElementById(spinId);
		if (spin) spin.style.display = 'inline';
		updateFilterButtons();
		setTimeout(function() {
			expandedPerfect = {};
			renderCards();
			if (spin) spin.style.display = 'none';
		}, 0);
	}

	function toggleFilter(which) {
		if (which === 'correct') { showCorrect = !showCorrect; triggerRender('spin-correct'); }
		else                     { showNeeds   = !showNeeds;   triggerRender('spin-needs'); }
	}

	function refreshView() {
		var spin = document.getElementById('spin-refresh');
		if (spin) spin.style.display = 'inline';
		setTimeout(function() {
			// Recount from current verseState
			var newPerfect = verseState.filter(isPerfect).length;
			var newNeeds   = verseState.length - newPerfect;
			perfectCount = newPerfect;
			needsCount   = newNeeds;
			// Update pill labels
			var bc = document.getElementById('btn-filter-correct');
			var bn = document.getElementById('btn-filter-needs');
			if (bc) bc.innerHTML = pillHTML(fmt(newPerfect) + ' correct', 'spin-correct', 'showing-correct');
			if (bn) bn.innerHTML = pillHTML(fmt(newNeeds) + ' need correction', 'spin-needs', 'showing-needs');
			updateFilterUI();
			// Re-render: cards no longer matching current filter disappear
			expandedPerfect = {};
			renderCards();
			var spin2 = document.getElementById('spin-refresh');
			if (spin2) spin2.style.display = 'none';
		}, 0);
	}

	function navigateNeeds(dir) {
		// Build ordered list of indices that need correction and are currently rendered
		var needsIndices = [];
		verseState.forEach(function(v, idx) {
			if (!isPerfect(v) && document.getElementById('verse-card-' + idx)) {
				needsIndices.push(idx);
			}
		});
		if (needsIndices.length === 0) return;

		var currentPos = needsIndices.indexOf(focusedIndex);
		var nextPos;
		if (currentPos === -1) {
			nextPos = dir >= 0 ? 0 : needsIndices.length - 1;
		} else {
			nextPos = currentPos + dir;
			if (nextPos < 0) nextPos = needsIndices.length - 1;
			if (nextPos >= needsIndices.length) nextPos = 0;
		}
		var targetIdx = needsIndices[nextPos];

		// Focus without repositioning the panel yet (scroll hasn't happened)
		if (focusedIndex !== null) {
			var prev = document.getElementById('verse-card-' + focusedIndex);
			if (prev) prev.classList.remove('focused');
		}
		focusedIndex = targetIdx;
		var card = document.getElementById('verse-card-' + targetIdx);
		if (card) card.classList.add('focused');
		panel.classList.add('visible');

		if (card) scrollToCard(card);
	}

	function renderCards() {
		container.innerHTML = '';
		verses.forEach(function(_, idx) {
			var v = verseState[idx];
			var perf = isPerfect(v);
			if (perf  && !showCorrect) return;
			if (!perf && !showNeeds)   return;
			if (meterFilter[meterBase(v)] === false) return;
			var isCompact = perf && !expandedPerfect[idx];
			var card = buildCard(idx, isCompact);
			if (focusedIndex === idx) card.classList.add('focused');
			container.appendChild(card);
		});
		if (container.children.length === 0) {
			var empty = document.createElement('div');
			empty.className = 'bcm-hidden-notice';
			empty.style.cssText = 'font-size:1.1em;padding:2em';
			empty.textContent = 'No verses to show \u2014 toggle the buttons above.';
			container.appendChild(empty);
		}
		// If the previously focused card is still visible, scroll it back into view
		if (focusedIndex !== null) {
			var focusedCard = document.getElementById('verse-card-' + focusedIndex);
			if (focusedCard) scrollToCard(focusedCard);
		}
	}

	updateFilterButtons();
	renderCards();
	updateFilterUI();

	// Show timing as a tooltip on a small indicator
	// performance.now() is relative to navigationStart (time origin), so it measures
	// wall-clock time from the moment the browser started loading this page.
	var loadMs = performance.now();
	var timingEl = document.getElementById('timing-label');
	if (timingEl) {
		timingEl.textContent = '⏱';
		var tip = (duration ? 'identified in ' + duration.toFixed(1) + 's, ' : '') +
			'loaded in ' + (loadMs / 1000).toFixed(1) + 's';
		timingEl.title = tip;
	}

	// --- Focus / panel ---
	var panel = document.getElementById('bcm-panel');
	var stickyHeaderH = document.querySelector('.bcm-header').offsetHeight || 48;
	// Pin stats block directly below the sticky header
	document.querySelector('.bcm-stats-block').style.top = stickyHeaderH + 'px';
	// Show panel immediately on load, positioned below the stats block
	var statsBlockEl = document.querySelector('.bcm-stats-block');
	var initialPanelTop = (statsBlockEl ? statsBlockEl.getBoundingClientRect().bottom : stickyHeaderH) + 8;
	panel.style.top = initialPanelTop + 'px';
	panel.classList.add('visible');

	function positionPanel(idx) {
		var card = document.getElementById('verse-card-' + idx);
		if (!card) return;
		// Set top once from current viewport position — stays put until next card is focused
		var cardTop = card.getBoundingClientRect().top;
		panel.style.top = cardTop + 'px';
	}

	function focusCard(idx) {
		if (focusedIndex !== null) {
			// Save current panel opts back to the card we're leaving
			if (verseOpts[focusedIndex]) verseOpts[focusedIndex] = getPanelOpts();
			var prev = document.getElementById('verse-card-' + focusedIndex);
			if (prev) prev.classList.remove('focused');
		}
		focusedIndex = idx;
		// Load this card's opts into the panel
		if (verseOpts[idx]) setPanelOpts(verseOpts[idx]);
		var card = document.getElementById('verse-card-' + idx);
		if (card) card.classList.add('focused');
		panel.classList.add('visible');
		positionPanel(idx);

	}

	// --- Auto-run on option changes ---
	var autoRunTimer = null;
	function scheduleAutoRun() {
		clearTimeout(autoRunTimer);
		autoRunTimer = setTimeout(function() {
			if (focusedIndex === null) return;
			if (currentMode === 'identify') panelReidentify();
			else panelScan();
		}, 400);
	}

	// Rendering-only options: save to focused card's opts and re-render only that card
	['panel-weights','panel-morae','panel-garas','panel-align'].forEach(function(id) {
		document.getElementById(id).addEventListener('change', function() {
			if (focusedIndex === null) return;
			verseOpts[focusedIndex] = getPanelOpts();
			updateCardScansion(focusedIndex);
		});
	});
	// Resplit only matters in identify mode — triggers API call
	document.getElementById('panel-resplit').addEventListener('change', function() {
		if (focusedIndex === null) return;
		verseOpts[focusedIndex] = getPanelOpts();
		if (currentMode === 'identify') scheduleAutoRun();
	});

	// --- Click-to-edit, auto-save on blur ---
	function startEdit(idx) {
		if (editingIndex === idx) return;
		if (editingIndex !== null) commitEdit(editingIndex);

		editingIndex = idx;
		var rawDiv  = document.getElementById('verse-raw-' + idx);
		var textDiv = document.getElementById('verse-raw-text-' + idx);

		var ta = document.createElement('textarea');
		ta.id = 'verse-edit-ta-' + idx;
		ta.value = verseState[idx].text_raw || '';
		ta.style.height = (textDiv.offsetHeight || 80) + 'px';
		ta.addEventListener('blur', function() { commitEdit(idx); });
		ta.addEventListener('keydown', function(e) {
			// Esc cancels
			if (e.key === 'Escape') { e.preventDefault(); cancelEdit(idx); }
		});
		ta.addEventListener('click', function(e) { e.stopPropagation(); });
		ta.addEventListener('input', function() {
			// Auto-run after text change (debounced)
			clearTimeout(autoRunTimer);
			autoRunTimer = setTimeout(function() {
				// Commit current text into verseState without closing editor
				var ta2 = document.getElementById('verse-edit-ta-' + idx);
				if (ta2) verseState[idx].text_raw = ta2.value;
				if (currentMode === 'identify') panelReidentify();
				else panelScan();
			}, 700);
		});

		rawDiv.insertBefore(ta, textDiv);
		textDiv.style.display = 'none';
		ta.focus();

		// Also focus the card in the panel
		focusCard(idx);
	}

	function commitEdit(idx) {
		var ta = document.getElementById('verse-edit-ta-' + idx);
		if (ta) verseState[idx].text_raw = ta.value;
		clearTimeout(autoRunTimer);
		finishEdit(idx);
	}

	function cancelEdit(idx) {
		finishEdit(idx);
	}

	function finishEdit(idx) {
		if (editingIndex === idx) editingIndex = null;
		var rawDiv  = document.getElementById('verse-raw-' + idx);
		var textDiv = document.getElementById('verse-raw-text-' + idx);
		var ta      = document.getElementById('verse-edit-ta-' + idx);
		if (textDiv) { textDiv.textContent = verseState[idx].text_raw || ''; textDiv.style.display = ''; }
		if (ta) ta.remove();
	}

	// --- Panel actions ---
	function getPanelSettings() {
		var opts = (focusedIndex !== null && verseOpts[focusedIndex]) ? verseOpts[focusedIndex] : getPanelOpts();
		return {
			from_scheme:    settings.from_scheme || 'Auto',
			resplit_option: opts.resplit_option,
			weights:        opts.weights,
			morae:          opts.morae,
			gaRas:          opts.gaRas,
			alignment:      opts.alignment,
		};
	}

	// Track in-flight fetch per verse so we can ignore stale responses
	var fetchSeq = {};

	window.panelReidentify = function() {
		if (focusedIndex === null) return;
		var idx = focusedIndex;
		// Use current textarea value if editing
		var ta = document.getElementById('verse-edit-ta-' + idx);
		var text = ta ? ta.value : verseState[idx].text_raw || '';

		var ps = getPanelSettings();
		var scanDiv = document.getElementById('verse-scan-' + idx);
		if (scanDiv) scanDiv.classList.add('stale');

		fetchSeq[idx] = (fetchSeq[idx] || 0) + 1;
		var seq = fetchSeq[idx];

		console.log('[identify-meter] idx:', idx, '\n  text:', JSON.stringify(text), '\n  from_scheme:', ps.from_scheme, '\n  resplit_option:', ps.resplit_option, '\n  weights:', ps.weights, 'morae:', ps.morae, 'gaRas:', ps.gaRas, 'alignment:', ps.alignment);

		var fd = new FormData();
		fd.append('input_text',   text);
		fd.append('from_scheme',  ps.from_scheme);
		fd.append('resplit_option', ps.resplit_option);
		fd.append('show_weights',   ps.weights   ? 'true' : 'false');
		fd.append('show_morae',     ps.morae     ? 'true' : 'false');
		fd.append('show_gaRas',     ps.gaRas     ? 'true' : 'false');
		fd.append('show_alignment', ps.alignment ? 'true' : 'false');

		fetch('/api/identify-meter', { method: 'POST', headers: { Accept: 'application/json' }, body: fd })
			.then(function(r) { return r.json(); })
			.then(function(data) {
				if (fetchSeq[idx] !== seq) return; // stale response
				console.log('[identify-meter] response idx:', idx, '\n  meter_label:', data.meter_label_full, '\n  score:', data.identification_score, '\n  result:', data.result);
				verseState[idx].text_raw             = text;
				verseState[idx].meter_label          = data.meter_label_full  || verseState[idx].meter_label;
				verseState[idx].identification_score = data.identification_score !== undefined
					? data.identification_score : verseState[idx].identification_score;
				verseState[idx].text_syllabified     = data.text_syllabified   || verseState[idx].text_syllabified;
				verseState[idx].syllable_weights     = data.syllable_weights    || verseState[idx].syllable_weights;
				verseState[idx].morae_per_line       = data.morae_per_line      || verseState[idx].morae_per_line;
				verseState[idx].gaRa_abbreviations   = data.gaRa_abbreviations  || verseState[idx].gaRa_abbreviations;
				verseState[idx].diagnostic           = data.diagnostic != null ? data.diagnostic : verseState[idx].diagnostic;
				verseState[idx].summary              = data.result               || verseState[idx].summary;
				updateCardHeader(idx);
				updateCardScansion(idx);
			})
			.catch(function(err) {
				if (scanDiv) scanDiv.classList.remove('stale');
				console.error('Re-identification failed:', err);
			});
	};

	window.panelScan = function() {
		if (focusedIndex === null) return;
		var idx = focusedIndex;
		var ta = document.getElementById('verse-edit-ta-' + idx);
		var text = ta ? ta.value : verseState[idx].text_raw || '';

		var ps = getPanelSettings();
		var scanDiv = document.getElementById('verse-scan-' + idx);
		if (scanDiv) scanDiv.classList.add('stale');

		fetchSeq[idx] = (fetchSeq[idx] || 0) + 1;
		var seq = fetchSeq[idx];

		var fd = new FormData();
		fd.append('input_text',   text);
		fd.append('from_scheme',  ps.from_scheme);
		fd.append('show_weights',   ps.weights   ? 'true' : 'false');
		fd.append('show_morae',     ps.morae     ? 'true' : 'false');
		fd.append('show_gaRas',     ps.gaRas     ? 'true' : 'false');
		fd.append('show_alignment', ps.alignment ? 'true' : 'false');

		fetch('/api/scan', { method: 'POST', headers: { Accept: 'application/json' }, body: fd })
			.then(function(r) { return r.json(); })
			.then(function(data) {
				if (fetchSeq[idx] !== seq) return;
				verseState[idx].text_raw           = text;
				verseState[idx].text_syllabified   = data.text_syllabified   || verseState[idx].text_syllabified;
				verseState[idx].syllable_weights   = data.syllable_weights    || verseState[idx].syllable_weights;
				verseState[idx].morae_per_line     = data.morae_per_line      || verseState[idx].morae_per_line;
				verseState[idx].gaRa_abbreviations = data.gaRa_abbreviations  || verseState[idx].gaRa_abbreviations;
				updateCardScansion(idx);
			})
			.catch(function(err) {
				if (scanDiv) scanDiv.classList.remove('stale');
				console.error('Scan failed:', err);
			});
	};

	// --- Export ---
	function downloadFile(content, filename, mimeType) {
		var blob = new Blob([content], { type: mimeType });
		var url = URL.createObjectURL(blob);
		var a = document.createElement('a'); a.href = url; a.download = filename; a.click();
		URL.revokeObjectURL(url);
	}
	// Warn before navigating away — dismissed automatically when user exports
	var exported = false;
	window.addEventListener('beforeunload', function(e) {
		if (!exported) {
			e.preventDefault();
			e.returnValue = '';  // required for Chrome
		}
	});

	window.exportTxt = function() {
		exported = true;
		var lines = [];
		verseState.forEach(function(v) {
			lines.push(v.text_raw || ''); lines.push('');
			lines.push(v.summary || '');  lines.push('');
		});
		lines.push('sam\u0101ptam: ' + verseState.length + ' pady\u0101ni' +
			(duration ? ', ' + duration.toFixed(6) + ' k\u1e63a\u1e47\u0101\u1e25' : ''));
		downloadFile(lines.join('\n'), 'batch_meter_results.txt', 'text/plain;charset=utf-8');
	};
	window.exportCsv = function() {
		exported = true;
		var rows = [['verse_number','verse_text','meter_label','syllable_weights','identification_score']];
		verseState.forEach(function(v, i) {
			rows.push([i+1,
				'"' + (v.text_raw||'').replace(/"/g,'""') + '"',
				'"' + (v.meter_label||'').replace(/"/g,'""') + '"',
				'"' + (v.syllable_weights||'').replace(/"/g,'""') + '"',
				v.identification_score||0]);
		});
		downloadFile(rows.map(function(r){return r.join(',');}).join('\n'),
			'batch_meter_results.csv','text/csv;charset=utf-8');
	};

	function escHtml(s) {
		return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
	}
})();
</script>
