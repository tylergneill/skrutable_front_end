{% extends 'base.html' %}
{% set active_page = 'settings' %}

{% block content %}
	<div class="page-content settings-form">

		<form id="settings_form">

			<h1>settings</h1>
			<br>

			<h2>transliteration</h2>
			<p>
				<input type="checkbox" id="avoid_virama_indic_scripts" name="avoid_virama_indic_scripts" value="avoid_virama_indic_scripts" checked>
				<label for="avoid_virama_indic_scripts">avoid vir&#257;ma for Indic scripts</label>
			</p>

			<h2>splitting</h2>
			<p>
				<input type="checkbox" id="preserve_punctuation" name="preserve_punctuation" value="preserve_punctuation" checked>
				<label for="preserve_punctuation">preserve punctuation</label>
			</p>
			<p>
				<select id="splitter_model" name="splitter_model">
					<option value="dharmamitra_2024_sept">Dharmamitra Sept 2024 (default)</option>
					<option value="splitter_2018">2018 Sanskrit Sandhi and Compound Splitter</option>
				</select>
			</p>
			<div id="preserve_compound_hyphens_row" style="display: none;">
				<p>
					<input type="checkbox" id="preserve_compound_hyphens" name="preserve_compound_hyphens" value="preserve_compound_hyphens" checked>
					<label for="preserve_compound_hyphens">preserve compound hyphens</label>
				</p>
			</div>

			<br>

			<p>
				<button type="button" id="save_settings" class="btn btn-primary" onclick="saveSettings();">Save</button>
			</p>

			<div id="popover" class="settings-save-msg">settings saved</div>

		</form>

		<br>
		<h2>reset</h2>
		<p>Clear all saved settings and return to defaults.</p>
		<p>
			<button type="button" class="btn btn-primary" onclick="resetAll();">Reset Everything</button>
		</p>

	</div>
{% endblock %}

{% block scripts %}
<script>

	function initialize_choices() {
		var avoidVirama = localStorage.getItem("avoid_virama_indic_scripts");
		if (avoidVirama === "false") {
			document.getElementById("avoid_virama_indic_scripts").checked = false;
		}

		var preservePunc = localStorage.getItem("preserve_punctuation");
		if (preservePunc === "false") {
			document.getElementById("preserve_punctuation").checked = false;
		}

		var preserveHyphens = localStorage.getItem("preserve_compound_hyphens");
		if (preserveHyphens === "false") {
			document.getElementById("preserve_compound_hyphens").checked = false;
		}

		var splitterModel = localStorage.getItem("splitter_model");
		if (splitterModel) {
			document.getElementById("splitter_model").value = splitterModel;
		}

		toggle_preserve_compound_hyphens();
	}

	function toggle_preserve_compound_hyphens() {
		const splitterModel = document.getElementById("splitter_model").value;
		const preserveCompoundHyphensRow = document.getElementById("preserve_compound_hyphens_row");
		if (splitterModel === "dharmamitra_2024_sept") {
			preserveCompoundHyphensRow.style.display = "block";
		} else {
			preserveCompoundHyphensRow.style.display = "none";
		}
	}

	function saveSettings() {
		localStorage.setItem("avoid_virama_indic_scripts",
			document.getElementById("avoid_virama_indic_scripts").checked ? "true" : "false");
		localStorage.setItem("preserve_punctuation",
			document.getElementById("preserve_punctuation").checked ? "true" : "false");
		localStorage.setItem("preserve_compound_hyphens",
			document.getElementById("preserve_compound_hyphens").checked ? "true" : "false");
		localStorage.setItem("splitter_model",
			document.getElementById("splitter_model").value);

		var popover = document.getElementById('popover');
		popover.classList.add('visible');
		setTimeout(function() {
			popover.classList.remove('visible');
		}, 750);
	}

	window.onload = function() {
		initialize_choices();
	}

	document.getElementById("splitter_model").addEventListener("change", toggle_preserve_compound_hyphens);

	function resetAll() {
		if (!confirm("Reset all settings and clear saved data?")) return;
		localStorage.removeItem("avoid_virama_indic_scripts");
		localStorage.removeItem("splitter_model");
		localStorage.removeItem("preserve_compound_hyphens");
		localStorage.removeItem("preserve_punctuation");
		window.location.href = "/?reset";
	}
</script>
{% endblock %}
